services:
  postgres:
    image: postgres:16
    container_name: calcms-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d calcms"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: calcms-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_PROVIDER: ${DB_PROVIDER:?Set DB_PROVIDER in .env}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:?Set POSTGRES_USER in .env}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:?Set POSTGRES_DB in .env}
    command: sh -c "alembic upgrade head && uvicorn calcms_api.main:app --host 0.0.0.0 --port 8080"
    ports:
      - "8080:8080"

volumes:
  postgres_data: